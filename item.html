<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="" />
        <meta name="author" content="" />
        <title>Banquinha Vermelha Jundiaí - Produto</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <!-- Navigation-->
        <nav class="navbar navbar-expand-lg navbar-dark bg-danger">
            <div class="container px-4 px-lg-5">
                <a class="navbar-brand text-warning" href="index.html">Banquinha Vermelha Jundiaí</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation"><span class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                        <li class="nav-item"><a class="nav-link text-warning" aria-current="page" href="index.html">Home</a></li>
                        <li class="nav-item"><a class="nav-link text-warning" href="contatos.html">Contato</a></li>
                    </ul>
                </div>
            </div>
        </nav>
        <!-- Header-->
        <header class="bg-danger py-5">
            <div class="container px-4 px-lg-5 my-5">
                <div class="text-center text-warning">
                    <h1 class="display-4 fw-bolder" id="produto-titulo">CARREGANDO...</h1>
                    <p class="lead fw-normal text-warning-50 mb-0">Ajude na construção da revolução</p>
                </div>
            </div>
        </header>
        <!-- Product section-->
        <section class="py-5">
            <div class="container px-4 px-lg-5 my-5">
                <div id="produto-detalhes" class="row gx-4 gx-lg-5 align-items-center">
                    <!-- Carregado dinamicamente -->
                </div>
            </div>
        </section>
        <!-- Related products section-->
        <section class="py-5 bg-light">
            <div class="container px-4 px-lg-5 mt-5">
                <h2 class="fw-bolder mb-4">Produtos Relacionados</h2>
                <div id="produtos-relacionados" class="row gx-4 gx-lg-5 row-cols-2 row-cols-md-3 row-cols-xl-4 justify-content-center">
                    <!-- Carregado dinamicamente -->
                </div>
            </div>
        </section>
        <!-- Footer-->
        <footer class="py-5 bg-danger">
            <div class="container"><p class="m-0 text-center text-warning">Copyright &copy; Banquinha Vermelha 2026</p></div>
        </footer>
        <!-- Bootstrap core JS-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <!-- Core theme JS-->
        <script>
            document.addEventListener('DOMContentLoaded', function() {
                // Obter o ID da querystring
                const urlParams = new URLSearchParams(window.location.search);
                const produtoId = parseInt(urlParams.get('id')) || 1;

                fetch('produtos.json')
                    .then(response => response.json())
                    .then(produtos => {
                        // Encontrar o produto
                        const produto = produtos.find(p => p.id === produtoId);
                        
                        if (!produto) {
                            document.getElementById('produto-detalhes').innerHTML = '<div class="col-12"><p>Produto não encontrado.</p></div>';
                            return;
                        }

                        // Carregar detalhes do produto
                        const imagemPrincipal = produto.imagem;
                        const nomeProduto = produto.nome;
                        const precoProduto = produto.preco;
                        const descricao = produto['details.description'] || 'Descrição não disponível.';
                        const imagens = produto['details.images'] || [imagemPrincipal];

                        // Atualizar o título da página
                        document.getElementById('produto-titulo').textContent = nomeProduto.toUpperCase();

                        // Construir a galeria de imagens
                        let galerias = '';
                        imagens.forEach(img => {
                            galerias += `<div class="mb-3"><img class="card-img-top w-100" src="${img}" alt="..." /></div>`;
                        });

                        // Construir as estrelas
                        let estrelasHTML = '';
                        if (produto.estrelas > 0) {
                            estrelasHTML = '<div class="d-flex justify-content-center small text-warning mb-2">';
                            for (let i = 0; i < produto.estrelas; i++) {
                                estrelasHTML += '<div class="bi-star-fill"></div>';
                            }
                            estrelasHTML += '</div>';
                        }

                        // Montar o HTML do produto
                        const produtoHTML = `
                            <div class="col-md-6">
                                ${galerias}
                            </div>
                            <div class="col-md-6">
                                <h1 class="display-5 fw-bolder">${nomeProduto}</h1>
                                ${estrelasHTML}
                                <div class="fs-5 mb-5">
                                    <span>${precoProduto}</span>
                                </div>
                                <p class="lead">${descricao}</p>
                            </div>
                        `;

                        document.getElementById('produto-detalhes').innerHTML = produtoHTML;

                        // Carregar produtos relacionados (todos exceto o atual)
                        const container = document.getElementById('produtos-relacionados');
                        const produtosRelacionados = produtos.filter(p => p.id !== produtoId).slice(0, 4);

                        produtosRelacionados.forEach(prod => {
                            const colDiv = document.createElement('div');
                            colDiv.className = 'col mb-5';

                            let badgeHTML = '';
                            if (prod.sale) {
                                badgeHTML = '<div class="badge bg-dark text-white position-absolute" style="top: 0.5rem; right: 0.5rem">Sale</div>';
                            }

                            let estrelasHtml = '';
                            if (prod.estrelas > 0) {
                                estrelasHtml = '<div class="d-flex justify-content-center small text-warning mb-2">';
                                for (let i = 0; i < prod.estrelas; i++) {
                                    estrelasHtml += '<div class="bi-star-fill"></div>';
                                }
                                estrelasHtml += '</div>';
                            }

                            colDiv.innerHTML = `
                                <div class="card h-100">
                                    ${badgeHTML}
                                    <img class="card-img-top" src="${prod.imagem}" alt="..." />
                                    <div class="card-body p-4">
                                        <div class="text-center">
                                            <h5 class="fw-bolder">${prod.nome}</h5>
                                            ${estrelasHtml}
                                            ${prod.preco}
                                        </div>
                                    </div>
                                    <div class="card-footer p-4 pt-0 border-top-0 bg-transparent">
                                        <div class="text-center"><a class="btn btn-outline-danger mt-auto" href="item.html?id=${prod.id}">${prod.acao}</a></div>
                                    </div>
                                </div>
                            `;

                            container.appendChild(colDiv);
                        });
                    })
                    .catch(error => console.error('Erro ao carregar produtos:', error));
            });
        </script>
    </body>
</html>
